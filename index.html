<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070605">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">
<title>Our Story</title>

<!-- ШРИФТ: скачай "Playfair Display" из Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Cinzel:wght@300;400;600&family=EB+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
<script src="story.config.js"></script>

<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --gold:        #c9a96e;
  --gold-light:  #e8d5a3;
  --gold-dim:    rgba(201,169,110,.18);
  --rose:        #d4a0a0;
  --rose-light:  #f0cece;
  --cream:       #f5efe6;
  --dark:        #070605;
  --dark-2:      #0e0b09;
  --text:        #ede0cc;

  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);

  --scene-pad-v: clamp(60px, 10vh, 100px);
  --scene-pad-h: clamp(16px, 5vw,  80px);
}

/* ─── RESET ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}
html, body {
  width: 100%; height: 100%;
  height: 100dvh;
  overflow: hidden;
  background: var(--dark);
  font-family: 'Playfair Display', Georgia, serif;
  color: var(--text);
}

/* ─── CUSTOM CURSOR (desktop only) ─── */
@media (pointer: fine) {
  * { cursor: none !important; }
  #cursor {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: screen;
    opacity: .8; will-change: transform;
  }
  #cursor-ring {
    position: fixed; width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(201,169,110,.35);
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: width .25s, height .25s, opacity .2s;
    opacity: .6; will-change: transform;
  }
}
@media (pointer: coarse) {
  #cursor, #cursor-ring { display: none; }
}

/* ─── BACKGROUND CANVAS ─── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  will-change: contents;
}

/* ─── FALLING WORDS CANVAS ─── */
#words-canvas {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}
#words-canvas.visible { opacity: 1; }

/* ─── FILM GRAIN — только на не-мобильных, без анимации translateY ─── */
@media (pointer: fine) {
  .grain {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none; opacity: .04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: ga .6s steps(2) infinite;
    will-change: opacity;
  }
  @keyframes ga {
    0%,100% { opacity:.04; }
    50%     { opacity:.02; }
  }
}
@media (pointer: coarse) { .grain { display: none; } }

/* ─── VIGNETTE ─── */
.vignette {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(ellipse 80% 75% at center,
    transparent 32%, rgba(0,0,0,.72) 75%, rgba(0,0,0,.97) 100%);
}

/* ─── CINEMATIC BARS ─── */
#lt, #lb {
  position: fixed; left: 0; right: 0; z-index: 4;
  background: #000;
  height: clamp(36px, 5.5vh, 56px);
  pointer-events: none;
  will-change: height;
  transition: height 1.6s cubic-bezier(.86,0,.07,1);
}
#lt { top: 0; }
#lb { bottom: 0; }
#lt::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent,
    rgba(201,169,110,.15) 30%, rgba(201,169,110,.3) 50%,
    rgba(201,169,110,.15) 70%, transparent);
}
#lb::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent,
    rgba(201,169,110,.15) 30%, rgba(201,169,110,.3) 50%,
    rgba(201,169,110,.15) 70%, transparent);
}

/* ─── PROGRESS BAR ─── */
#pbar {
  position: fixed; bottom: 0; left: 0; height: 2px; z-index: 50;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--rose), var(--gold));
  background-size: 200% 100%;
  box-shadow: 0 0 14px rgba(201,169,110,.5), 0 0 4px rgba(212,160,160,.3);
  animation: pbar-shine 3s linear infinite;
  will-change: width;
}
@keyframes pbar-shine {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* ─── CHAPTER LABEL ─── */
#chapter-lbl {
  position: fixed;
  top: calc(var(--safe-top) + clamp(48px, 8vh, 68px));
  left: 50%; transform: translateX(-50%);
  z-index: 40; opacity: 0; pointer-events: none;
  font-family: 'Cinzel', serif;
  font-size: clamp(7px, 1.6vw, 8.5px);
  letter-spacing: clamp(4px, 1.5vw, 8px);
  text-transform: uppercase;
  color: rgba(201,169,110,.45); white-space: nowrap;
  text-shadow: 0 0 30px rgba(201,169,110,.3);
}

/* ─── HEART CANVAS ─── */
#heart-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0;
  will-change: opacity;
}

/* ─── AMBIENT BLOBS — только transform, без filter анимации ─── */
.blob {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 0;
  filter: blur(80px); mix-blend-mode: screen;
  will-change: transform;
}
.blob-1 {
  width: clamp(400px,80vw,800px); height: clamp(400px,80vw,800px);
  left: -25%; top: -25%;
  background: radial-gradient(circle,rgba(185,95,70,.09) 0%,rgba(160,80,50,.04) 50%,transparent 70%);
  animation: bd 24s ease-in-out infinite alternate;
}
.blob-2 {
  width: clamp(350px,70vw,700px); height: clamp(350px,70vw,700px);
  right: -18%; bottom: -18%;
  background: radial-gradient(circle,rgba(100,75,170,.08) 0%,rgba(80,60,140,.03) 50%,transparent 70%);
  animation: bd 30s ease-in-out infinite alternate-reverse;
}
.blob-3 {
  width: clamp(250px,50vw,500px); height: clamp(250px,50vw,500px);
  left: 50%; top: 50%; transform: translate(-50%,-50%);
  background: radial-gradient(circle,rgba(201,169,110,.03) 0%,transparent 60%);
  animation: bd3 18s ease-in-out infinite;
}
/* На мобильных блобы отключаем — экономим GPU */
@media (pointer: coarse) {
  .blob { animation: none !important; display: none; }
}
@keyframes bd  { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,50px) scale(1.15); } }
@keyframes bd3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-50%,-48%) scale(1.08); } }

/* ─── UI LAYER ─── */
#ui {
  position: fixed; inset: 0; z-index: 20;
  display: flex; align-items: center; justify-content: center;
  perspective: 1100px;
}

/* ─── SCENES ─── */
.scene {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; flex-direction: column;
  gap: clamp(12px, 2.5vh, 20px);
  padding: var(--scene-pad-v) var(--scene-pad-h);
  padding-top:    max(var(--scene-pad-v), calc(var(--safe-top)    + clamp(36px,5.5vh,56px) + 20px));
  padding-bottom: max(var(--scene-pad-v), calc(var(--safe-bottom) + clamp(36px,5.5vh,56px) + 20px));
  padding-left:   max(var(--scene-pad-h), var(--safe-left));
  padding-right:  max(var(--scene-pad-h), var(--safe-right));
  will-change: opacity, transform;
}
.scene.active { pointer-events: auto; }

/* ─── TEXT ELEMENTS ─── */
.text-card { text-align: center; max-width: min(680px, 92vw); }
.t-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: clamp(7.5px, 1.8vw, 9.5px);
  letter-spacing: clamp(4px, 1.5vw, 8px);
  text-transform: uppercase; color: var(--gold);
  margin-bottom: clamp(12px, 2.5vh, 22px); opacity: 0;
  text-shadow: 0 0 40px rgba(201,169,110,.35);
}
.t-headline {
  font-size: clamp(22px, 5vw, 50px);
  font-weight: 400; font-style: italic; line-height: 1.25;
  color: var(--cream); opacity: 0;
  text-shadow: 0 2px 32px rgba(0,0,0,.6), 0 0 80px rgba(201,169,110,.06);
  font-family: 'Playfair Display', serif;
}
.t-body {
  margin-top: clamp(12px, 2vh, 20px);
  font-size: clamp(13px, 2vw, 15.5px);
  line-height: 1.95; color: rgba(237,224,204,.62);
  opacity: 0; font-style: italic; letter-spacing: .2px;
  font-family: 'Playfair Display', serif;
}
.gold-line {
  height: 1px; width: 0;
  margin-top: clamp(14px, 2.5vh, 24px);
  background: linear-gradient(90deg, var(--gold), rgba(201,169,110,.1));
  box-shadow: 0 0 12px rgba(201,169,110,.25);
}

/* ─── PHOTO FRAME ─── */
.photo-frame {
  position: relative; opacity: 0;
  transform-style: preserve-3d; overflow: hidden;
  will-change: transform, opacity;
}
.photo-frame img, .photo-frame video {
  display: block; width: 100%; height: 100%; object-fit: cover;
  filter: sepia(.12) contrast(1.05) brightness(.94);
}
.photo-frame::before {
  content: ''; position: absolute; inset: -1px;
  border: 1px solid rgba(201,169,110,.32);
  pointer-events: none; z-index: 2;
  box-shadow: inset 0 0 30px rgba(0,0,0,.4), 0 0 40px rgba(0,0,0,.5);
}
.photo-frame::after {
  content: ''; position: absolute; inset: 8px;
  border: 1px solid rgba(201,169,110,.1);
  pointer-events: none; z-index: 2;
}
.photo-shine {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(125deg,
    rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 40%, transparent 60%);
}
.photo-caption {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 4;
  padding: clamp(22px, 4vh, 36px) 18px clamp(10px, 2vh, 16px);
  background: linear-gradient(transparent, rgba(0,0,0,.72));
  font-family: 'Cinzel', serif;
  font-size: clamp(7.5px, 1.5vw, 8.5px);
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold-light); text-align: center;
  text-shadow: 0 1px 8px rgba(0,0,0,.8);
}

/* ─── VIDEO BADGE ─── */
.vid-badge {
  position: absolute; top: 12px; right: 12px; z-index: 5;
  width: clamp(26px, 5vw, 30px); height: clamp(26px, 5vw, 30px);
  border-radius: 50%; background: rgba(0,0,0,.6);
  border: 1px solid rgba(201,169,110,.45);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.vid-badge svg { width: 11px; height: 11px; fill: var(--gold); margin-left: 2px; }

/* ─── GALLERY GRID ─── */
.gallery-grid {
  display: grid; gap: clamp(4px, 1vw, 8px);
  width: 100%; max-width: min(880px, 96vw); opacity: 0;
}
.gallery-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.gallery-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.gallery-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }

.g-item {
  position: relative; overflow: hidden;
  background: #0c0a08; aspect-ratio: 3/4;
  cursor: pointer; will-change: transform;
}
.g-item img, .g-item video {
  width: 100%; height: 100%; object-fit: cover;
  filter: sepia(.18) contrast(1.04) brightness(.92);
  transform: scale(1.04);
  transition: transform 6s ease;
}
/* На мобильных убираем hover-эффекты */
@media (pointer: fine) {
  .g-item:hover img, .g-item:hover video {
    transform: scale(1.1);
    filter: sepia(.06) contrast(1.08) brightness(.98);
  }
  .g-item::after {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,.55));
    opacity: 0; transition: opacity .5s;
  }
  .g-item:hover::after { opacity: 1; }
  .g-item .g-caption { opacity: 0; transition: opacity .4s; }
  .g-item:hover .g-caption { opacity: 1; }
}
@media (pointer: coarse) {
  .g-item img, .g-item video { transition: none; }
  .g-item::after {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.65));
    opacity: 1;
  }
  .g-item .g-caption { opacity: 1; }
}
.g-item .g-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 14px 14px; z-index: 2;
  background: linear-gradient(transparent, rgba(0,0,0,.78));
  font-family: 'Cinzel', serif;
  font-size: clamp(7px, 1.5vw, 8.5px);
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold-light);
  text-align: center; text-shadow: 0 1px 6px rgba(0,0,0,.9);
}

/* ─── VIDEO OVERLAY ─── */
#vid-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(5,4,3,.95);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .5s cubic-bezier(.4,0,.2,1);
  padding: calc(var(--safe-top) + 20px)
           calc(var(--safe-right) + 20px)
           calc(var(--safe-bottom) + 20px)
           calc(var(--safe-left) + 20px);
  will-change: opacity;
}
#vid-overlay.open { opacity: 1; pointer-events: auto; }
#vid-overlay video {
  max-width: min(90vw, 900px);
  max-height: 80dvh;
  width: auto; height: auto;
  border: 1px solid rgba(201,169,110,.22);
  box-shadow: 0 0 80px rgba(0,0,0,.8), 0 0 40px rgba(201,169,110,.08);
  outline: none;
}
#vid-close {
  position: absolute;
  top: max(28px, calc(var(--safe-top) + 16px));
  right: max(32px, calc(var(--safe-right) + 16px));
  font-family: 'Cinzel', serif;
  font-size: clamp(8px, 2vw, 9px);
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(201,169,110,.5); cursor: pointer;
  background: none; border: none;
  transition: color .3s;
  padding: 12px 16px;
  min-width: 48px; min-height: 48px;
}
#vid-close:hover { color: var(--gold-light); }
#vid-caption-overlay {
  position: absolute;
  bottom: max(44px, calc(var(--safe-bottom) + 28px));
  left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: clamp(8px, 2vw, 9.5px);
  letter-spacing: 6px; text-transform: uppercase;
  color: rgba(201,169,110,.48); white-space: nowrap;
}

/* ─── FILMSTRIP ─── */
.filmstrip-wrap {
  overflow: hidden; width: 100%; opacity: 0; position: relative;
  /* Liquid glass container */
  isolation: isolate;
}

/* Center-bright, edge-dark vignette mask — фото в центре ярче, по краям темнее */
.filmstrip-wrap::after {
  content: '';
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
  background: linear-gradient(
    90deg,
    rgba(7,6,5,.92) 0%,
    rgba(7,6,5,.55) 8%,
    rgba(7,6,5,.18) 18%,
    transparent 32%,
    transparent 68%,
    rgba(7,6,5,.18) 82%,
    rgba(7,6,5,.55) 92%,
    rgba(7,6,5,.92) 100%
  );
}

/* Liquid glass shimmer line top */
.filmstrip-wrap::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px; z-index: 11; pointer-events: none;
  background: linear-gradient(90deg,
    transparent 0%, rgba(201,169,110,.08) 20%,
    rgba(255,255,255,.18) 50%,
    rgba(201,169,110,.08) 80%, transparent 100%
  );
}

/* Glass panel за filmstrip */
.filmstrip-glass {
  position: absolute; inset: 0; pointer-events: none; z-index: 9;
  backdrop-filter: blur(0px) saturate(1.2);
  -webkit-backdrop-filter: blur(0px) saturate(1.2);
  background: linear-gradient(
    180deg,
    rgba(255,255,255,.012) 0%,
    rgba(201,169,110,.018) 50%,
    rgba(0,0,0,.08) 100%
  );
  border-top: 1px solid rgba(255,255,255,.06);
  border-bottom: 1px solid rgba(255,255,255,.04);
  /* Left/right glass edge glow */
  box-shadow:
    inset 4px 0 24px rgba(0,0,0,.35),
    inset -4px 0 24px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.07);
}

.filmstrip { display: flex; gap: 0; width: max-content; will-change: transform; }

.film-item {
  flex: 0 0 auto;
  width: clamp(120px, 28vw, 215px);
  aspect-ratio: 3/4;
  position: relative; overflow: hidden;
  background: #0d0b09;
  border-left: 1px solid rgba(201,169,110,.06);
  border-right: 1px solid rgba(0,0,0,.6);
  cursor: pointer;
  /* Liquid glass micro border on each item */
  transition: filter .4s ease;
}
.film-item img, .film-item video {
  width: 100%; height: 100%; object-fit: cover;
  filter: sepia(.25) contrast(1.02);
  transform: scale(1.04);
}
.film-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(transparent 50%, rgba(0,0,0,.6));
  z-index: 1;
}

/* Liquid glass reflection inside each film-item */
.film-item::after {
  content: ''; position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.07) 0%,
    rgba(255,255,255,.02) 30%,
    transparent 55%,
    rgba(201,169,110,.03) 100%
  );
}

.film-item .film-caption {
  position: absolute; bottom: 10px; left: 0; right: 0; text-align: center;
  font-family: 'Cinzel', serif; font-size: clamp(7px, 1.5vw, 8px);
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold-light); z-index: 2; opacity: .75;
  text-shadow: 0 1px 6px rgba(0,0,0,.9);
}

/* ─── LIQUID GLASS — глобальный стиль ─── */

/* Photo frames — жидкое стекло */
.photo-frame {
  border-radius: 2px;
  box-shadow:
    0 8px 32px rgba(0,0,0,.55),
    0 2px 8px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.09),
    inset 0 -1px 0 rgba(0,0,0,.3),
    0 0 0 1px rgba(201,169,110,.18);
}
.photo-frame::before {
  border-radius: 2px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.07) 0%,
    transparent 40%,
    rgba(201,169,110,.04) 100%
  ) !important;
  border: 1px solid rgba(255,255,255,.08) !important;
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(1px);
}

/* Timer blocks — жидкое стекло */
.t-block {
  border-radius: 3px;
  background: rgba(255,255,255,.028) !important;
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border: 1px solid rgba(255,255,255,.09) !important;
  box-shadow:
    0 4px 24px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -1px 0 rgba(0,0,0,.25),
    0 0 0 1px rgba(201,169,110,.08);
}
.t-block::before {
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.08) 0%,
    rgba(201,169,110,.04) 50%,
    transparent 100%
  ) !important;
  border-radius: 3px;
}

/* Gallery items — лёгкое стекло */
.g-item {
  border-radius: 2px;
  box-shadow:
    0 2px 12px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.06),
    0 0 0 1px rgba(201,169,110,.06);
}

/* Start button — жидкое стекло */
.start-btn {
  backdrop-filter: blur(16px) saturate(1.6);
  -webkit-backdrop-filter: blur(16px) saturate(1.6);
  background: rgba(255,255,255,.04) !important;
  border: 1px solid rgba(255,255,255,.14) !important;
  box-shadow:
    0 8px 32px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -1px 0 rgba(0,0,0,.2),
    0 0 0 1px rgba(201,169,110,.1);
  border-radius: 1px;
}

/* Intro screen — liquid glass glow */
#intro-screen {
  background: rgba(7,6,5,.88) !important;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
#intro-screen::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none; z-index: 0; border-radius: inherit;
  background: linear-gradient(
    160deg,
    rgba(255,255,255,.025) 0%,
    transparent 40%,
    rgba(201,169,110,.015) 100%
  );
  border: 1px solid rgba(255,255,255,.05);
}

/* Thank author button — уже имеет backdrop, усиливаем */
.thank-author-btn {
  box-shadow:
    0 4px 20px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.1),
    inset 0 -1px 0 rgba(0,0,0,.2) !important;
  border: 1px solid rgba(255,255,255,.1) !important;
}

/* Chapter label — glass pill */
#chapter-lbl {
  padding: 4px 14px;
  background: rgba(7,6,5,.55);
  backdrop-filter: blur(12px) saturate(1.5);
  -webkit-backdrop-filter: blur(12px) saturate(1.5);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 100px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
}
.filmstrip-wrap::before, .filmstrip-wrap::after {
  content: ''; position: absolute; left: 0; right: 0; height: 12px;
  background: repeating-linear-gradient(90deg,
    transparent 0, transparent 24px,
    rgba(0,0,0,.9) 24px, rgba(0,0,0,.9) 32px);
  z-index: 3; pointer-events: none;
}
.filmstrip-wrap::before { top: 0; }
.filmstrip-wrap::after  { bottom: 0; }

/* ─── FULLSCREEN VIDEO SCENE ─── */
.scene-video-bg { position: absolute; inset: 0; overflow: hidden; }
.scene-video-bg video {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(.5) saturate(.85);
}
.scene-video-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,.38) 0%, rgba(0,0,0,.08) 45%, rgba(0,0,0,.55) 100%);
}

/* ─── TICKER ─── */
.ticker-label {
  position: absolute;
  bottom: max(70px, calc(var(--safe-bottom) + 50px));
  left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: clamp(8px, 1.8vw, 9.5px);
  letter-spacing: clamp(4px, 1.5vw, 7px);
  text-transform: uppercase; color: var(--gold);
  white-space: nowrap; opacity: 0;
  text-shadow: 0 0 30px rgba(201,169,110,.5), 0 0 60px rgba(201,169,110,.2);
}

/* ─── TIMER ─── */
.timer-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: clamp(18px, 3.5vh, 32px);
  opacity: 0; width: 100%;
  will-change: opacity, transform;
}
.timer-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(8.5px, 1.8vw, 10.5px);
  letter-spacing: clamp(5px, 2vw, 9px);
  text-transform: uppercase; color: var(--gold); text-align: center;
  text-shadow: 0 0 40px rgba(201,169,110,.4);
}
.timer-row {
  display: flex; gap: clamp(4px, 1.5vw, 20px);
  align-items: center; flex-wrap: nowrap;
}
.t-block {
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(6px, 1.5vh, 10px);
  min-width: clamp(52px, 13vw, 88px);
  border: 1px solid rgba(201,169,110,.18);
  padding: clamp(10px, 2vh, 22px) clamp(6px, 1.5vw, 18px);
  background: rgba(201,169,110,.018);
  position: relative; overflow: hidden;
}
.t-block::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(201,169,110,.06), transparent 50%);
}
.t-block::after {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,.3), transparent);
}
.t-num {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 6vw, 54px);
  font-weight: 400; color: var(--cream); line-height: 1;
  text-shadow: 0 0 40px rgba(201,169,110,.15);
  will-change: transform, opacity;
}
.t-num.flip { animation: nf .3s cubic-bezier(.4,0,.2,1); }
@keyframes nf {
  0%   { transform: translateY(-10px); opacity: 0; }
  60%  { transform: translateY(2px); }
  100% { transform: translateY(0); opacity: 1; }
}
.t-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(6.5px, 1.4vw, 7.5px);
  letter-spacing: clamp(2px, 1vw, 4px);
  text-transform: uppercase; color: rgba(201,169,110,.5);
}
.t-dot {
  font-size: clamp(18px, 4vw, 26px);
  color: rgba(201,169,110,.2); padding-bottom: 14px;
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse { 0%,100% { opacity: .2; } 50% { opacity: .5; } }
.timer-sub {
  font-style: italic;
  font-size: clamp(12px, 2.5vw, 14.5px);
  color: rgba(237,224,204,.4);
  text-align: center; letter-spacing: .5px;
  font-family: 'Playfair Display', serif;
}

/* ─── FINAL SCENE ─── */
#sc-final .final-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 0; width: 100%;
}
.final-media {
  position: relative;
  width: min(60vw, 380px);
  opacity: 0; flex-shrink: 0;
  will-change: transform, opacity;
}
.final-media img, .final-media video {
  width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover;
  filter: sepia(.1) contrast(1.06);
}
.final-media::before {
  content: ''; position: absolute; inset: -1px;
  border: 1px solid rgba(201,169,110,.32); pointer-events: none; z-index: 1;
  box-shadow: 0 0 60px rgba(0,0,0,.6), 0 20px 80px rgba(0,0,0,.4);
}
.final-media::after {
  content: ''; position: absolute; inset: 10px;
  border: 1px solid rgba(201,169,110,.08); pointer-events: none; z-index: 1;
}
.final-poem {
  font-size: clamp(13px, 3vw, 18px);
  font-style: italic; line-height: 2.2;
  color: var(--cream); letter-spacing: .6px;
  text-shadow: 0 2px 30px rgba(0,0,0,.95), 0 0 80px rgba(0,0,0,.7);
  white-space: pre-line; opacity: 0;
  margin-top: clamp(28px, 5vh, 48px);
  text-align: center; max-width: min(520px, 92vw);
  font-family: 'EB Garamond', 'Playfair Display', serif;
}

/* ─── INTRO SCREEN ─── */
#intro-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(20px, 4vh, 34px);
  text-align: center;
  padding: calc(var(--safe-top) + 40px)
           calc(var(--safe-right) + 24px)
           calc(var(--safe-bottom) + 40px)
           calc(var(--safe-left) + 24px);
  background: var(--dark);
  will-change: opacity, transform;
}
#intro-screen::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at center,
    rgba(201,169,110,.035) 0%, transparent 60%);
}
.intro-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: clamp(8.5px, 2vw, 10.5px);
  letter-spacing: clamp(6px, 2.5vw, 10px);
  text-transform: uppercase; color: var(--gold);
  opacity: 0; transform: translateY(20px);
  text-shadow: 0 0 40px rgba(201,169,110,.4);
  will-change: transform, opacity;
}
.intro-title {
  font-size: clamp(32px, 8vw, 80px);
  font-weight: 400; font-style: italic;
  line-height: 1.08; color: var(--cream);
  opacity: 0; transform: translateY(28px);
  text-shadow: 0 4px 40px rgba(0,0,0,.5);
  font-family: 'Playfair Display', serif;
  will-change: transform, opacity;
}
.intro-sub {
  font-size: clamp(12.5px, 2.5vw, 14.5px);
  font-style: italic; color: rgba(240,206,206,.65);
  letter-spacing: 1.5px; line-height: 1.75;
  opacity: 0; transform: translateY(18px);
  font-family: 'Playfair Display', serif;
  will-change: transform, opacity;
}
.intro-divider {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 12px rgba(201,169,110,.3);
}
.start-btn {
  padding: clamp(12px,2vh,16px) clamp(32px,8vw,54px);
  border: 1px solid rgba(201,169,110,.35); border-radius: 0;
  cursor: pointer; background: transparent;
  font-family: 'Cinzel', serif;
  font-size: clamp(8.5px, 1.8vw, 9.5px);
  font-weight: 400; letter-spacing: clamp(4px, 1.5vw, 7px);
  text-transform: uppercase; color: var(--gold-light);
  opacity: 0; transform: translateY(18px);
  position: relative; overflow: hidden;
  transition: color .45s, border-color .45s;
  min-height: 48px;
  will-change: transform, opacity;
}
.start-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg,
    transparent, rgba(201,169,110,.12), var(--gold),
    rgba(201,169,110,.12), transparent);
  transform: scaleX(0); transform-origin: left;
  transition: transform .55s cubic-bezier(.77,0,.18,1); z-index: -1;
}
.start-btn:hover::before, .start-btn:focus::before { transform: scaleX(1); }
.start-btn:hover, .start-btn:focus {
  color: var(--dark); border-color: var(--gold);
  outline: none;
}
.start-btn::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 40%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
  animation: btn-shimmer 3.5s ease-in-out infinite 2s;
}
@keyframes btn-shimmer { 0% { left: -40%; } 100% { left: 140%; } }

/* ─── SC2/SC5 two-column ─── */
.scene-two-col {
  flex-direction: row;
  gap: clamp(20px, 4vw, 56px);
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
}
.scene-two-col .text-card {
  text-align: left;
  max-width: min(330px, 90vw);
}

/* ─── SELECTION ─── */
::selection { background: rgba(201,169,110,.22); color: var(--cream); }

/* ─── ЗОЛОТОЙ ПУЛЬС на intro ─── */
@keyframes goldPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
  50%      { box-shadow: 0 0 30px 8px rgba(201,169,110,.08); }
}
#intro-screen { animation: goldPulse 6s ease-in-out infinite; }

/* ═══════════════ RESPONSIVE ══════════════════ */
@media (max-width: 900px) {
  .gallery-grid.cols-4 { grid-template-columns: repeat(3, 1fr); }
  .final-media { width: min(70vw, 340px); }
}
@media (max-width: 600px) {
  .gallery-grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .gallery-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
  .final-media { width: min(72vw, 300px); }
  .scene-two-col {
    flex-direction: column;
    gap: clamp(16px, 3vh, 24px);
  }
  .scene-two-col .text-card {
    text-align: center;
    max-width: 92vw;
  }
  .photo-frame[style*="36vw"] { width: min(64vw, 240px) !important; }
  .photo-frame[style*="38vw"] { width: min(64vw, 240px) !important; }
}
@media (max-width: 420px) {
  .gallery-grid.cols-4,
  .gallery-grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
  .film-item { width: clamp(110px, 44vw, 175px); }
  .final-media { width: 78vw; }
  .timer-row { gap: clamp(3px, 1vw, 8px); }
  .t-dot { font-size: 16px; padding-bottom: 10px; }
  .filmstrip-wrap::before,
  .filmstrip-wrap::after { height: 8px; }
}
@media (max-height: 500px) and (orientation: landscape) {
  .scene {
    padding-top: max(8px, calc(var(--safe-top) + 8px));
    padding-bottom: max(8px, calc(var(--safe-bottom) + 8px));
    gap: 8px; overflow-y: auto;
    justify-content: flex-start; align-items: center;
  }
  .t-headline { font-size: clamp(16px, 3.5vw, 28px); }
  .t-body { font-size: 12px; line-height: 1.6; margin-top: 8px; }
  .t-num { font-size: clamp(18px, 5vw, 36px); }
  .timer-wrap { gap: 14px; }
  .timer-title { font-size: 8.5px; }
  .intro-title { font-size: clamp(26px, 6vw, 48px); }
  .final-media { width: min(38vh, 220px); }
  .final-poem { margin-top: 16px; font-size: 12px; }
}

/* ─── REDUCED MOTION ─── */
@media (prefers-reduced-motion: reduce) {
  .grain, .blob, .blob-3, .start-btn::after,
  #words-canvas { animation: none !important; display: none; }
  @keyframes pbar-shine { 0%,100% { background-position: 0 0; } }
  .g-item img, .g-item video,
  .film-item img, .film-item video { transition: none; transform: none !important; }
}
/* ─── THANK AUTHOR BUTTON ─── */
/* ─── КНОПКА "ОТБЛАГОДАРИТЬ АВТОРА" — правый нижний угол ─── */
.thank-author-wrap {
  position: fixed;
  bottom: max(14px, calc(var(--safe-bottom) + 10px));

.thank-author-wrap.visible {

}
.thank-author-btn {

  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.thank-author-btn:hover,
.thank-author-btn:focus-visible {
  border-color: rgba(201, 169, 110, 0.38);

}
.thank-author-btn:active {

}
.thank-icon {

  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.thank-author-btn:hover .thank-icon {
  transform: scale(1.25) rotate(-8deg);
}

<script>
window.addEventListener('load', function() {
  if (typeof gsap === 'undefined') return;
  gsap.registerPlugin(TextPlugin);
  initApp();
});

function initApp() {

const C = window.STORY_CONFIG;
const isMobile = window.matchMedia('(pointer:coarse)').matches;

// ═══ HELPERS ═══════════════════════════════════════════
function makeMedia(item, autoplay=false, muted=true){
  const {type='photo', src, poster} = item;
  if(type==='video'){
    const v = document.createElement('video');
    v.src = src;
    if(poster) v.poster = poster;
    v.muted = muted;
    v.playsInline = true;
    v.loop = true;
    v.setAttribute('playsinline','');
    v.setAttribute('webkit-playsinline','');
    if(autoplay){ v.autoplay = true; v.setAttribute('autoplay',''); }
    return v;
  } else {
    const img = document.createElement('img');
    img.src = src;
    img.alt = item.caption || '';
    img.loading = 'lazy';
    img.decoding = 'async';
    return img;
  }
}

function makeVidBadge(){
  const d = document.createElement('div');
  d.className = 'vid-badge';
  d.innerHTML = `<svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>`;
  return d;
}

function injectPhotoFrame(frameEl, item, autoplay=false){
  const media = makeMedia(item, autoplay);
  frameEl.insertBefore(media, frameEl.firstChild);
  if(item.caption){
    const cap = document.createElement('div');
    cap.className = 'photo-caption';
    cap.textContent = item.caption;
    frameEl.appendChild(cap);
  }
  if(item.type==='video') frameEl.appendChild(makeVidBadge());
}

function buildGrid(containerId, items){
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'g-item';
    const media = makeMedia(item, item.type==='video', true);
    div.appendChild(media);
    if(item.caption){
      const cap = document.createElement('div');
      cap.className = 'g-caption';
      cap.textContent = item.caption;
      div.appendChild(cap);
    }
    if(item.type==='video'){
      div.appendChild(makeVidBadge());
      div.addEventListener('click', ()=>openVideoOverlay(item.src, item.caption||''));
    }
    el.appendChild(div);
  });
}

function buildFilmstrip(fsId, items){
  const el = document.getElementById(fsId);
  el.innerHTML = '';
  const all = [...items, ...items, ...items];
  all.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'film-item';
    const media = makeMedia(item, item.type==='video', true);
    div.appendChild(media);
    if(item.caption){
      const cap = document.createElement('div');
      cap.className = 'film-caption';
      cap.textContent = item.caption;
      div.appendChild(cap);
    }
    if(item.type==='video'){
      div.appendChild(makeVidBadge());
      div.addEventListener('click', ()=>openVideoOverlay(item.src, item.caption||''));
    }
    el.appendChild(div);
  });
}

// ═══ STARFIELD (оптимизирован: меньше частиц на мобильном) ════
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d', {alpha:false});
  let W, H, rafId;
  const starCount = isMobile ? 80 : 200;
  const dustCount = isMobile ? 20 : 60;
  const stars = [];
  const dust  = [];

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  let resizeTimer;
  window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 200);
  }, {passive:true});

  for(let i=0;i<starCount;i++) stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random()*1.0+.08,
    a: Math.random(),
    s: (Math.random()-.5)*.00012,
    gold: Math.random()<.12
  });
  for(let i=0;i<dustCount;i++) dust.push({
    x: Math.random(), y: Math.random(),
    r: Math.random()*.4+.05,
    a: Math.random()*.25,
    s: (Math.random()-.5)*.00008
  });

  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden) cancelAnimationFrame(rafId);
    else rafId = requestAnimationFrame(frame);
  });

  // Throttle to ~30fps on mobile
  let lastFrame = 0;
  const fpsInterval = isMobile ? 33 : 16;

  function frame(ts){
    rafId = requestAnimationFrame(frame);
    if(ts - lastFrame < fpsInterval) return;
    lastFrame = ts;

    ctx.fillStyle = '#070605';
    ctx.fillRect(0, 0, W, H);

    // nebula — только на десктопе
    if(!isMobile){
      const nb = ctx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,W*.4);
      nb.addColorStop(0,'rgba(201,169,110,.008)');
      nb.addColorStop(1,'transparent');
      ctx.fillStyle = nb; ctx.fillRect(0,0,W,H);
    }

    dust.forEach(s=>{
      s.a += s.s; if(s.a<0||s.a>.25) s.s=-s.s;
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,213,163,${s.a})`; ctx.fill();
    });

    stars.forEach(s=>{
      s.a += s.s; if(s.a<.05||s.a>1) s.s=-s.s;
      const b = s.gold?'201,169,110':'232,220,190';
      if(s.r>.6 && !isMobile){
        const g = ctx.createRadialGradient(s.x*W,s.y*H,0,s.x*W,s.y*H,s.r*3.5);
        g.addColorStop(0,`rgba(${b},${s.a*.28})`);
        g.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r*3.5,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${b},${s.a*.55})`; ctx.fill();
    });
  }
  rafId = requestAnimationFrame(frame);
})();

// ═══ FALLING WORDS / PARTICLES ════════════════════════════════
(function(){
  const c = document.getElementById('words-canvas');
  const ctx = c.getContext('2d');
  let W, H, rafId, active = false;

  // Слова которые падают — настрой под себя!
  const WORDS = ['любовь', 'навсегда', '♡', 'вместе', 'счастье',
                 '✦', 'моя', 'всегда', '∞', 'нежность',
                 'радость', '✧', 'мечта', 'тепло', '❤'];

  const particles = [];
  const COUNT = isMobile ? 22 : 40;

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', ()=>{ resize(); }, {passive:true});

  function spawnParticle(i){
    const isWord = Math.random() > 0.4;
    return {
      x: Math.random() * W,
      y: -40 - Math.random() * H,
      vy: 0.18 + Math.random() * 0.35,     // очень медленно
      vx: (Math.random() - .5) * 0.12,
      alpha: 0,
      alphaTarget: 0.06 + Math.random() * 0.1,
      text: WORDS[Math.floor(Math.random()*WORDS.length)],
      size: isWord ? (isMobile ? 9 : 11) : (isMobile ? 12 : 15),
      isWord,
      drift: (Math.random()-.5) * 0.002,   // колебание
      angle: 0,
      phase: Math.random() * Math.PI * 2,
    };
  }

  for(let i=0;i<COUNT;i++){
    const p = spawnParticle(i);
    p.y = Math.random() * H; // начинаем рассыпаными
    particles.push(p);
  }

  let lastFrame = 0;
  const interval = isMobile ? 50 : 33;

  function frame(ts){
    if(!active){ rafId = requestAnimationFrame(frame); return; }
    rafId = requestAnimationFrame(frame);
    if(ts - lastFrame < interval) return;
    lastFrame = ts;

    ctx.clearRect(0,0,W,H);

    particles.forEach(p=>{
      p.y += p.vy;
      p.phase += 0.008;
      p.x += p.vx + Math.sin(p.phase) * 0.3;

      // fade in
      if(p.alpha < p.alphaTarget) p.alpha += 0.002;

      if(p.y > H + 60){
        // переспавниваем сверху
        Object.assign(p, spawnParticle(0));
        p.y = -30;
      }

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.font = `${p.isWord ? 'italic ' : ''}${p.size}px 'Cinzel', serif`;
      ctx.fillStyle = p.isWord ? '#c9a96e' : '#e8d5a3';
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
    });
  }
  rafId = requestAnimationFrame(frame);

  window.wordsStart = function(){
    active = true;
    document.getElementById('words-canvas').classList.add('visible');
  };
  window.wordsStop = function(){
    active = false;
    document.getElementById('words-canvas').classList.remove('visible');
    ctx.clearRect(0,0,W,H);
  };
})();

// ═══ HEART PARTICLES (оптимизирован) ══════════════════════════
(function(){
  const c = document.getElementById('heart-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  const N = isMobile ? 800 : 2000;
  const pts = [];

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  let resizeTimer2;
  window.addEventListener('resize', ()=>{
    clearTimeout(resizeTimer2);
    resizeTimer2 = setTimeout(resize, 200);
  }, {passive:true});

  for(let i=0;i<N;i++){
    const t = Math.random()*Math.PI*2;
    const sc = Math.min(window.innerWidth, window.innerHeight)*.017;
    pts.push({
      x: (Math.random()-.5)*window.innerWidth,
      y: (Math.random()-.5)*window.innerHeight,
      tx: 16*Math.pow(Math.sin(t),3)*sc,
      ty: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*sc,
      r: Math.random()*1.1+.25, a: 0, delay: Math.random()*1.6
    });
  }

  let running=false, heartRaf;
  let lastHF = 0;
  const hInterval = isMobile ? 33 : 16;

  function draw(ts){
    if(ts - lastHF < hInterval){ if(running) heartRaf=requestAnimationFrame(draw); return; }
    lastHF = ts;
    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2;
    pts.forEach(p=>{
      if(p.a <= 0) return;
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.8);
      g.addColorStop(0,`rgba(215,155,155,${p.a*.9})`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.8,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });
    if(running) heartRaf = requestAnimationFrame(draw);
  }

  window.heartStart=function(){
    running=true;
    const cx=W/2, cy=H/2;
    pts.forEach(p=>{
      setTimeout(()=>{
        gsap.to(p, {x:cx+p.tx, y:cy+p.ty, a:1,
          duration:2.4+Math.random()*.8, ease:'power3.inOut'});
      }, p.delay*1e3);
    });
    requestAnimationFrame(draw);
  };
  window.heartFade=function(cb){
    pts.forEach(p=>gsap.to(p,{a:0,duration:1.4,ease:'power2.in'}));
    setTimeout(()=>{ running=false; cancelAnimationFrame(heartRaf); if(cb)cb(); },1500);
  };
})();

const startDate = new Date(C.settings.startDate);

  const diff = Date.now()-startDate.getTime();
  const d = Math.floor(diff/864e5);
  const h = Math.floor((diff/36e5)%24);
  const m = Math.floor((diff/6e4)%60);
  const s = Math.floor((diff/1e3)%60);
  function set(id,val){
    const el = document.getElementById(id);
    const sv = String(val).padStart(2,'0');
    if(el && el.textContent!==sv){
      el.textContent=sv;
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
    }
  }
  set('td',d); set('th',h); set('tm',m); set('ts',s);
}
setInterval(updateTimer,1000); updateTimer();

function showChapter(i){

function hideScene(id,cb){
  // На мобильных — без blur (дорого)
  const props = isMobile
    ? {opacity:0, duration:.8, ease:'power2.in', onComplete:()=>{
        const el=document.getElementById(id);
        el.classList.remove('active'); el.style.transform='';
        if(cb)cb();
      }}
    : {opacity:0,scale:.985,filter:'blur(3px)',duration:.9,ease:'power2.in',onComplete:()=>{
        const el=document.getElementById(id);
        el.classList.remove('active'); el.style.filter=''; el.style.transform='';
        if(cb)cb();
      }};
  gsap.to('#'+id, props);
}

function showScene(id){
  const el = document.getElementById(id);
  el.classList.add('active');
  if(isMobile){
    gsap.fromTo(el,
      {opacity:0, y:8},
      {opacity:1, y:0, duration:1, ease:'power2.out',
       onComplete:()=>{ el.style.transform=''; }}
    );
  } else {
    gsap.fromTo(el,
      {opacity:0, scale:1.018, filter:'blur(4px)'},
      {opacity:1, scale:1, filter:'blur(0px)', duration:1.1, ease:'power2.out',
       onComplete:()=>{ el.style.filter=''; }}
    );
  }
}

function revealGrid(id){
  const items = document.querySelectorAll('#'+id+' .g-item');
  gsap.fromTo(items,{opacity:0,y:24,scale:.96},
    {opacity:1,y:0,scale:1,duration:.85,stagger:.08,ease:'power3.out'});
}

function animateFilmstrip(wrapId, stripId, dir=1){
  const wrap  = document.getElementById(wrapId);
  const strip = document.getElementById(stripId);
  gsap.to(wrap,{opacity:1,duration:.8});
  const totalW = strip.scrollWidth/3;
  gsap.fromTo(strip,
    {x: dir>0 ? 0 : -totalW},
    {x: dir>0 ? -totalW : 0, duration:22, ease:'none', repeat:-1}
  );

  // Center-brightness effect: items near center are brighter
  const wrapRect = ()=> wrap.getBoundingClientRect();
  let rafBrightness;
  function updateBrightness(){
    const wr = wrapRect();
    const cx = wr.left + wr.width / 2;
    const halfW = wr.width * 0.5;
    const items = strip.querySelectorAll('.film-item');
    items.forEach(item=>{
      const r = item.getBoundingClientRect();
      const itemCx = r.left + r.width / 2;
      const dist = Math.abs(itemCx - cx);
      // 0 at center → full brightness; halfW at edge → dim
      const t = Math.min(dist / halfW, 1);
      // brightness from 1.08 (center) down to 0.38 (far edge)
      const brightness = 1.08 - t * 0.70;
      // scale slightly: center items slightly bigger
      const sc = 1 + (1 - t) * 0.04;
      item.style.filter = `brightness(${brightness.toFixed(2)}) saturate(${(0.8 + (1-t)*0.5).toFixed(2)})`;
      item.style.transform = `scale(${sc.toFixed(3)})`;
      item.style.transformOrigin = 'center center';
      item.style.zIndex = Math.round((1-t)*10);
    });
    rafBrightness = requestAnimationFrame(updateBrightness);
  }
  rafBrightness = requestAnimationFrame(updateBrightness);
}

(function(){
  const dot  = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  if(!dot || !ring || isMobile) return;
  let mx=0, my=0, rx=0, ry=0;
  window.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left=mx+'px'; dot.style.top=my+'px';
  }, {passive:true});
  (function loop(){
    rx += (mx-rx)*.14; ry += (my-ry)*.14;
    ring.style.left=Math.round(rx)+'px';
    ring.style.top =Math.round(ry)+'px';
    requestAnimationFrame(loop);
  })();
})();

window.beginStory = function(){
  gsap.to('#intro-screen',{opacity:0,scale:.97,duration:1.2,ease:'power2.in',
    onComplete:()=>{
      document.getElementById('intro-screen').style.display='none';
    }
  });

  const music = document.getElementById('bg-music');
  music.volume = 0;
  // Автозапуск музыки сразу при нажатии "Начать"
  music.play().then(()=>{
    gsap.to(music,{volume:C.settings.musicVolume,duration:4.5});
  }).catch(()=>{
    // Fallback: пробуем снова через касание
    const retry = ()=>{
      music.play().catch(()=>{});
      gsap.to(music,{volume:C.settings.musicVolume,duration:4.5});
      document.removeEventListener('touchstart', retry);
      document.removeEventListener('click', retry);
    };
    document.addEventListener('touchstart', retry, {once:true});
    document.addEventListener('click', retry, {once:true});
  });

  setTimeout(()=>{
    document.getElementById('lt').style.height='0';
    document.getElementById('lb').style.height='0';
  },400);

  setTimeout(()=>{ buildAndPlay(); },1000);
};

<!-- PRELOADER: показывает прогресс загрузки видео/медиа перед кнопкой Начать -->
<div id="preloader-overlay" style="
  position:fixed;inset:0;z-index:200;
  background:#070605;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;

">
  <div style="
    font-family:'Cinzel',serif;
    font-size:clamp(8px,1.8vw,9.5px);
    letter-spacing:clamp(4px,1.5vw,8px);
    text-transform:uppercase;
    color:rgba(201,169,110,.5);
  " id="preloader-text">Загрузка…</div>
  <div style="
    width:clamp(160px,40vw,280px);
    height:1px;
    background:rgba(201,169,110,.12);
    position:relative;overflow:hidden;
  ">
    <div id="preloader-bar" style="
      position:absolute;top:0;left:0;height:100%;width:0%;
      background:linear-gradient(90deg,var(--gold),var(--rose),var(--gold));
      transition:width 0.3s ease;
    "></div>
  </div>
  <div style="
    font-family:'Playfair Display',serif;
    font-size:clamp(9px,2vw,11px);
    color:rgba(237,224,204,.2);
    font-style:italic;
  " id="preloader-pct">0%</div>
</div>

<script>
(function(){
  // Собираем все медиафайлы из конфига после его загрузки
  function waitForConfig(cb, attempts){
    attempts = attempts || 0;
    if(window.STORY_CONFIG){ cb(); return; }
    if(attempts > 100){ cb(); return; } // fallback
    setTimeout(function(){ waitForConfig(cb, attempts+1); }, 80);
  }

  function collectMediaUrls(C){
    var urls = [];
    var scenes = [C.scene2,C.scene5,C.scene6,C.sceneFinal];
    scenes.forEach(function(s){
      if(s && s.media && s.media.src) urls.push(s.media.src);
    });
    var gridScenes = [C.scene3, C.scene4, C.scene7, C.scene9];
    gridScenes.forEach(function(s){
      if(s && s.items) s.items.forEach(function(it){ if(it.src) urls.push(it.src); });
    });
    if(C.settings && C.settings.musicUrl) urls.push(C.settings.musicUrl);
    // дедупликация
    return urls.filter(function(v,i,a){ return a.indexOf(v)===i; });
  }

  function preloadOne(url, onProgress){
    return new Promise(function(resolve){
      // Для видео — только metadata, не весь файл (экономим трафик, но гарантируем начало)
      var isVideo = /\.(mp4|webm|mov|m4v)(\?|$)/i.test(url);
      var isAudio = /\.(mp3|ogg|aac|wav|m4a)(\?|$)/i.test(url);

      if(isVideo){
        var v = document.createElement('video');
        v.preload = 'auto';
        v.muted = true;
        v.playsInline = true;
        var done = false;
        function fin(){ if(!done){ done=true; onProgress(); resolve(); } }
        v.addEventListener('canplaythrough', fin);
        v.addEventListener('error', fin);
        setTimeout(fin, 8000); // таймаут 8с на видео
        v.src = url;
        v.load();
      } else if(isAudio){
        var a = document.createElement('audio');
        a.preload = 'auto';
        var done = false;
        function fin(){ if(!done){ done=true; onProgress(); resolve(); } }
        a.addEventListener('canplaythrough', fin);
        a.addEventListener('error', fin);
        setTimeout(fin, 6000);
        a.src = url;
        a.load();
      } else {
        // Картинки
        var img = new Image();
        img.onload = img.onerror = function(){ onProgress(); resolve(); };
        img.src = url;
      }
    });
  }

  waitForConfig(function(){
    var C = window.STORY_CONFIG;
    if(!C){ hidePreloader(); return; }
    var urls = collectMediaUrls(C);
    if(!urls.length){ hidePreloader(); return; }

    var loaded = 0;
    var total = urls.length;

    function onProgress(){
      loaded++;
      var pct = Math.round((loaded/total)*100);
      var bar = document.getElementById('preloader-bar');
      var pctEl = document.getElementById('preloader-pct');
      var txt = document.getElementById('preloader-text');
      if(bar) bar.style.width = pct + '%';
      if(pctEl) pctEl.textContent = pct + '%';
      if(txt){
        if(pct < 30) txt.textContent = 'Загружаем воспоминания…';
        else if(pct < 60) txt.textContent = 'Почти готово…';
        else if(pct < 90) txt.textContent = 'Собираем историю…';
        else txt.textContent = 'Готово ✦';
      }
      if(loaded >= total) setTimeout(hidePreloader, 600);
    }

    // Запускаем параллельно, но не больше 3 одновременно
    var queue = urls.slice();
    var active = 0;
    var maxConcurrent = 3;

    function next(){
      while(active < maxConcurrent && queue.length){
        active++;
        var url = queue.shift();
        preloadOne(url, onProgress).then(function(){ active--; next(); });
      }
    }
    next();
  });

  function hidePreloader(){
    var el = document.getElementById('preloader-overlay');
    if(!el) return;
    el.style.opacity = '0';
    setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 900);
  }
})();
</script>
